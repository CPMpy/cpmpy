name: Github Tests
on: [push] # Can also put pull_request here, but then we dont run it when directly pushing to master
jobs:
  test:
    strategy:
      fail-fast: true # cancel all jobs as soon as one solver test suite fails
      matrix:
        include:
          - solver: ortools
          - solver: z3
          - solver: pysat
            install_commands: |
              pip install pypblib
          - solver: choco
          - solver: exact
          - solver: gcs
          - solver: minizinc
            install_commands: |
              sudo snap install minizinc --classic
          - solver: pindakaas
          - solver: pumpkin
          - solver: scip
    uses: ./.github/workflows/test-solver.yml
    with:
      solver: ${{ matrix.solver }}
      install_commands: ${{ matrix.install_commands || '' }}

  coverage:
    name: Merge coverage
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install coverage
        run: pip install coverage

      - name: Download all coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-data-*

      - name: Merge coverage reports
        run: |
          set -euo pipefail
          # Each artifact is in its own directory; rename to unique filenames
          i=0
          for dir in coverage-data-*/; do
            mv "${dir}.coverage" ".coverage.${i}"
            i=$((i + 1))
          done
          coverage combine
          coverage html -d coverage-html
          coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"

      - name: Upload merged coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-html/
