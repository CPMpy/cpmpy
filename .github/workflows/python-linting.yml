name: "Linting"
on: [push]
jobs:
  run_mypy:
    name: "Mypy Static Type Checks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Mypy
        run: pip install mypy
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install ".[test]"
      - name: Run Mypy
        uses: liskin/gh-problem-matcher-wrap@v2 # wrap mypy output as annotations
        with:   
          linters: mypy     
          run: mypy --show-column-numbers cpmpy tests