name: Test solver (reusable)

on:
  workflow_call:
    inputs:
      solver:
        description: "Solver name to pass to pytest --solver"
        required: true
        type: string
      install_commands:
        description: "Shell commands to install solver dependencies"
        required: false
        type: string
        default: ""

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install base test dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install ".[test, ${{ inputs.solver }}]"
          pip install pytest-xdist pytest-cov

      - name: Install solver dependencies
        if: ${{ inputs.install_commands != '' }}
        shell: bash
        run: |
          set -euo pipefail
          ${{ inputs.install_commands }}

      - name: Test with pytest
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -n auto tests/ --solver "${{ inputs.solver }}" -ref \
            --cov=cpmpy --cov-report=html:coverage-html --cov-report=xml:coverage.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ inputs.solver }}
          path: coverage-html/
